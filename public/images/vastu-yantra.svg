<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none" stroke="rgba(243,178,58,0.12)" stroke-width="0.8">
  <!-- Outer lotus petals -->
  <circle cx="400" cy="400" r="380" stroke-width="0.5"/>
  <circle cx="400" cy="400" r="360" stroke-width="0.3"/>

  <!-- 16 lotus petals outer -->
  <g>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(0,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(22.5,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(45,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(67.5,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(90,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(112.5,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(135,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(157.5,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(180,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(202.5,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(225,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(247.5,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(270,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(292.5,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(315,400,400)"/>
    <ellipse cx="400" cy="40" rx="28" ry="60" transform="rotate(337.5,400,400)"/>
  </g>

  <!-- 8 lotus petals inner -->
  <g>
    <ellipse cx="400" cy="100" rx="22" ry="50" transform="rotate(0,400,400)"/>
    <ellipse cx="400" cy="100" rx="22" ry="50" transform="rotate(45,400,400)"/>
    <ellipse cx="400" cy="100" rx="22" ry="50" transform="rotate(90,400,400)"/>
    <ellipse cx="400" cy="100" rx="22" ry="50" transform="rotate(135,400,400)"/>
    <ellipse cx="400" cy="100" rx="22" ry="50" transform="rotate(180,400,400)"/>
    <ellipse cx="400" cy="100" rx="22" ry="50" transform="rotate(225,400,400)"/>
    <ellipse cx="400" cy="100" rx="22" ry="50" transform="rotate(270,400,400)"/>
    <ellipse cx="400" cy="100" rx="22" ry="50" transform="rotate(315,400,400)"/>
  </g>

  <!-- Outer square (Bhupura) -->
  <rect x="60" y="60" width="680" height="680" stroke-width="0.6"/>
  <rect x="50" y="50" width="700" height="700" stroke-width="0.3"/>

  <!-- Gate extensions (T-shapes on each side) -->
  <line x1="340" y1="50" x2="340" y2="10"/>
  <line x1="460" y1="50" x2="460" y2="10"/>
  <line x1="340" y1="10" x2="460" y2="10"/>

  <line x1="340" y1="750" x2="340" y2="790"/>
  <line x1="460" y1="750" x2="460" y2="790"/>
  <line x1="340" y1="790" x2="460" y2="790"/>

  <line x1="50" y1="340" x2="10" y2="340"/>
  <line x1="50" y1="460" x2="10" y2="460"/>
  <line x1="10" y1="340" x2="10" y2="460"/>

  <line x1="750" y1="340" x2="790" y2="340"/>
  <line x1="750" y1="460" x2="790" y2="460"/>
  <line x1="790" y1="340" x2="790" y2="460"/>

  <!-- Sri Yantra triangles — 4 upward (Shiva) -->
  <polygon points="400,120 580,560 220,560"/>
  <polygon points="400,180 540,500 260,500"/>
  <polygon points="400,220 510,460 290,460"/>
  <polygon points="400,260 480,420 320,420"/>

  <!-- Sri Yantra triangles — 5 downward (Shakti) -->
  <polygon points="400,680 200,240 600,240"/>
  <polygon points="400,620 240,280 560,280"/>
  <polygon points="400,570 270,320 530,320"/>
  <polygon points="400,530 300,350 500,350"/>
  <polygon points="400,490 330,375 470,375"/>

  <!-- Central bindu -->
  <circle cx="400" cy="400" r="4" fill="rgba(243,178,58,0.15)" stroke="none"/>
  <circle cx="400" cy="400" r="8" stroke-width="0.4"/>
</svg>
